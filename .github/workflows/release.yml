name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Build Lexer and Parser
        run: |
          npm run build-lexer -w @bell/core
          npm run build-parser -w @bell/core

      - name: Build Core
        run: npm run build -w @bell/core

      - name: Publish @bell/core
        run: npm publish -w @bell/core --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-vscode:
    runs-on: ubuntu-latest
    needs: release-core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Extension
        run: npm run compile -w bell

      - name: Package extension
        run: npx vsce package -o bell.vsix
        working-directory: packages/vscode

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: bell-vscode-extension
          path: packages/vscode/bell.vsix

      - name: Publish to Marketplace
        run: npx vsce publish -p ${{ secrets.VSCE_PAT }}
        working-directory: packages/vscode
        if: github.ref_type == 'tag'
