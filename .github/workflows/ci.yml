name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Core
        run: |
          npm run build-lexer -w bell-lang
          npm run build-parser -w bell-lang
          npm run build -w bell-lang

      - name: Run Tests
        run: npm test -w bell-lang
